<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipp Language Playground</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

<!-- CodeMirror 6 via CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">

<style>
/* ── Fonts ─────────────────────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap');

/* ── Design Tokens ─────────────────────────────────────────────────── */
:root {
  --bg0: #0d0e14;
  --bg1: #13141e;
  --bg2: #1c1e2d;
  --bg3: #252738;
  --bg4: #2f3244;
  --border: #3a3d57;
  --accent:    #7eb3ff;
  --accent2:   #c78dff;
  --accent3:   #67e5a0;
  --accent4:   #ff9f7e;
  --accent5:   #ffd580;
  --red:       #ff6b6b;
  --text:      #d4d8f0;
  --text2:     #8891b8;
  --text3:     #4f5577;
  --radius:    6px;
  --font-ui:   'Space Grotesk', system-ui, sans-serif;
  --font-code: 'JetBrains Mono', 'Fira Code', monospace;
}
body.light {
  --bg0: #f0f2fa;
  --bg1: #ffffff;
  --bg2: #e8ebf7;
  --bg3: #dde1f4;
  --bg4: #d0d5ee;
  --border: #b8bede;
  --text:  #1a1d2e;
  --text2: #4a5080;
  --text3: #8891b8;
}

/* ── Reset ─────────────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: var(--font-ui);
  background: var(--bg0);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── Header ────────────────────────────────────────────────────────── */
header {
  height: 52px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 14px;
  flex-shrink: 0;
  z-index: 10;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 17px; color: var(--text);
  white-space: nowrap;
}
.logo-gem {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent3) 0%, var(--accent) 60%, var(--accent2) 100%);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: #0d0e14;
  box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 50%, transparent);
}
.version-pill {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--accent2);
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
  font-family: var(--font-code);
  letter-spacing: 0.05em;
}
.header-spacer { flex: 1; }

/* ── Toolbar buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font-family: var(--font-ui);
  font-size: 12px; font-weight: 600;
  padding: 5px 10px; border-radius: var(--radius);
  cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.btn:hover { background: var(--bg4); color: var(--text); border-color: var(--accent); }
.btn.active { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--bg3)); }
.btn-run {
  background: var(--accent3); border-color: var(--accent3);
  color: #0a1a10; font-size: 13px; font-weight: 700; padding: 5px 16px;
}
.btn-run:hover { background: color-mix(in srgb, var(--accent3) 80%, white); border-color: var(--accent3); color: #0a1a10; }
.btn-run.loading { background: var(--bg4); border-color: var(--border); color: var(--text2); cursor: default; }

/* ── Status indicator ──────────────────────────────────────────────── */
#status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0;
  transition: background 0.3s;
}
#status-dot.ready  { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
#status-dot.running { background: var(--accent5); animation: pulse 0.8s infinite; }
#status-dot.error  { background: var(--red); }
#status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#status-text { font-size: 11px; color: var(--text3); font-family: var(--font-code); white-space: nowrap; }

/* ── Examples select ───────────────────────────────────────────────── */
.examples-select {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font-family: var(--font-ui); font-size: 12px;
  padding: 5px 8px; border-radius: var(--radius); cursor: pointer;
}
.examples-select:hover { border-color: var(--accent); color: var(--text); }
.examples-select option { background: var(--bg2); }

/* ── Main layout ───────────────────────────────────────────────────── */
.workspace {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}

/* ── Tab bars ──────────────────────────────────────────────────────── */
.tab-bar {
  display: flex; align-items: center; gap: 2px;
  background: var(--bg1); border-bottom: 1px solid var(--border);
  padding: 0 8px; height: 36px; flex-shrink: 0;
}
.tab {
  padding: 4px 14px; border-radius: 4px 4px 0 0;
  font-size: 12px; font-weight: 600; color: var(--text3);
  cursor: pointer; transition: all 0.1s; border: 1px solid transparent;
  border-bottom: none; position: relative; top: 1px;
}
.tab:hover { color: var(--text2); }
.tab.active {
  background: var(--bg0); color: var(--accent);
  border-color: var(--border); border-bottom-color: var(--bg0);
}
.tab-bar-spacer { flex: 1; }
.tab-meta { font-size: 11px; color: var(--text3); font-family: var(--font-code); }

/* ── Editor pane ───────────────────────────────────────────────────── */
.editor-pane {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.editor-pane .tab-bar { grid-row: 1; }
.editor-wrap { flex: 1; overflow: hidden; position: relative; }

/* ── CodeMirror overrides ──────────────────────────────────────────── */
.CodeMirror {
  height: 100% !important;
  font-family: var(--font-code) !important;
  font-size: 14px !important;
  line-height: 1.6 !important;
  background: var(--bg0) !important;
  color: var(--text) !important;
}
.CodeMirror-scroll { padding-bottom: 40px; }
.CodeMirror-gutters {
  background: var(--bg1) !important;
  border-right: 1px solid var(--border) !important;
}
.CodeMirror-linenumber { color: var(--text3) !important; }
.CodeMirror-cursor { border-left-color: var(--accent) !important; }
.CodeMirror-selected { background: color-mix(in srgb, var(--accent) 18%, transparent) !important; }
.CodeMirror-activeline-background { background: color-mix(in srgb, var(--bg4) 40%, transparent) !important; }
.CodeMirror-matchingbracket { color: var(--accent5) !important; font-weight: bold; background: color-mix(in srgb, var(--accent5) 15%, transparent) !important; }
/* Ipp syntax colours */
.cm-keyword   { color: #c78dff !important; font-style: italic; }
.cm-def       { color: #7eb3ff !important; font-weight: 600; }
.cm-variable  { color: #d4d8f0 !important; }
.cm-variable-2{ color: #a8c8ff !important; }
.cm-property  { color: #7eb3ff !important; }
.cm-string    { color: #67e5a0 !important; }
.cm-string-2  { color: #4ec994 !important; }
.cm-number    { color: #ffd580 !important; }
.cm-comment   { color: #4f5577 !important; font-style: italic; }
.cm-operator  { color: #ff9f7e !important; }
.cm-atom      { color: #ff9f7e !important; }    /* nil, true, false */
.cm-builtin   { color: #7dcfff !important; }
.cm-type      { color: #ffd580 !important; font-weight: 600; }
.cm-decorator { color: #c78dff !important; }
.cm-tag       { color: #ff6b6b !important; }
.cm-bracket   { color: #8891b8 !important; }
.cm-error-token { background: color-mix(in srgb, #ff6b6b 20%, transparent) !important; border-radius: 2px; }
/* autocomplete */
.CodeMirror-hints { background: var(--bg2) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; }
.CodeMirror-hint  { color: var(--text) !important; font-family: var(--font-code) !important; font-size: 13px !important; padding: 4px 10px !important; }
.CodeMirror-hint-active { background: color-mix(in srgb, var(--accent) 20%, var(--bg3)) !important; color: var(--accent) !important; }
/* light theme */
body.light .CodeMirror { background: #f5f7ff !important; color: #1a1d2e !important; }
body.light .CodeMirror-gutters { background: #eef0fc !important; }
body.light .cm-comment { color: #8891b8 !important; }

/* ── Right pane ────────────────────────────────────────────────────── */
.output-pane {
  display: flex; flex-direction: column; overflow: hidden;
}
.output-panels { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.output-tab-content { display: none; flex: 1; overflow: hidden; }
.output-tab-content.active { display: flex; flex-direction: column; }

/* Console */
#console-output {
  flex: 1; overflow-y: auto; padding: 12px 14px;
  font-family: var(--font-code); font-size: 13px; line-height: 1.7;
  background: var(--bg0);
}
.out-line { display: flex; gap: 10px; align-items: flex-start; padding: 1px 0; }
.out-line .gutter { color: var(--text3); min-width: 22px; text-align: right; user-select: none; font-size: 11px; padding-top: 2px; }
.out-line .text { flex: 1; word-break: break-all; white-space: pre-wrap; }
.out-line.print  .text { color: var(--text); }
.out-line.error  .text { color: var(--red); }
.out-line.warn   .text { color: var(--accent5); }
.out-line.system .text { color: var(--text3); font-style: italic; }
.out-line.success .text { color: var(--accent3); }
.out-line.input  .text { color: var(--accent2); }
.out-empty { color: var(--text3); font-style: italic; padding: 8px 2px; }
.ansi-bold { font-weight: bold; }

/* Canvas */
#canvas-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: var(--bg0); overflow: hidden; padding: 8px;
}
#ipp-canvas {
  border: 1px solid var(--border); border-radius: var(--radius);
  max-width: 100%; max-height: 100%; display: block;
  image-rendering: pixelated;
}

/* Docs panel */
#docs-content {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  font-size: 13px; line-height: 1.6; background: var(--bg0);
}
#docs-content h4 { color: var(--accent); margin: 12px 0 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
#docs-content code { font-family: var(--font-code); color: var(--accent3); background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
#docs-content .doc-entry { margin-bottom: 6px; display: flex; gap: 8px; flex-wrap: wrap; align-items: baseline; }
#docs-content .doc-name { font-family: var(--font-code); color: var(--accent); font-size: 12px; font-weight: 600; }
#docs-content .doc-desc { color: var(--text2); font-size: 12px; }

/* ── Status bar ────────────────────────────────────────────────────── */
.statusbar {
  height: 24px;
  background: var(--bg1);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  padding: 0 12px;
  font-family: var(--font-code); font-size: 11px;
  color: var(--text3); flex-shrink: 0;
}
.statusbar .sb-item { display: flex; align-items: center; gap: 4px; }
.sb-sep { color: var(--border); }

/* ── Pyodide load overlay ───────────────────────────────────────────── */
#pyodide-overlay {
  position: fixed; inset: 0; background: var(--bg0);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  z-index: 999; transition: opacity 0.4s;
}
#pyodide-overlay.hidden { opacity: 0; pointer-events: none; }
.boot-logo { font-size: 48px; animation: bounce 1s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-8px)} }
.boot-title { font-size: 22px; font-weight: 700; color: var(--text); }
.boot-sub   { font-size: 13px; color: var(--text3); font-family: var(--font-code); }
.boot-progress {
  width: 280px; height: 4px;
  background: var(--bg3); border-radius: 2px; overflow: hidden;
}
.boot-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px; transition: width 0.3s ease;
}
#boot-log { font-family: var(--font-code); font-size: 11px; color: var(--text3); max-width: 400px; text-align: center; min-height: 16px; }

/* ── Snackbar ───────────────────────────────────────────────────────── */
#snackbar {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg4); border: 1px solid var(--border);
  color: var(--text); padding: 8px 18px; border-radius: 20px;
  font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 9999;
  pointer-events: none; white-space: nowrap;
}
#snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Resizer ────────────────────────────────────────────────────────── */
.resizer {
  width: 4px; background: var(--border); cursor: col-resize;
  grid-row: 1 / -1; transition: background 0.15s;
}
.resizer:hover { background: var(--accent); }

/* ── Minimap / scroll indicator ─────────────────────────────────────── */
.editor-actions {
  display: flex; align-items: center; gap: 6px; padding: 0 6px;
}
.editor-actions .btn { padding: 3px 8px; font-size: 11px; }

/* ── Demo tabs ──────────────────────────────────────────────────────── */
.demo-chips {
  display: flex; gap: 4px; overflow-x: auto; padding: 0 4px;
  scrollbar-width: none;
}
.demo-chips::-webkit-scrollbar { display: none; }
.demo-chip {
  flex-shrink: 0; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text3); transition: all 0.12s;
}
.demo-chip:hover { color: var(--text); border-color: var(--accent); }
.demo-chip.active { background: color-mix(in srgb, var(--accent) 12%, var(--bg3)); border-color: var(--accent); color: var(--accent); }

/* ── Responsive ─────────────────────────────────────────────────────── */
@media (max-width: 760px) {
  .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
  .resizer { display: none; }
  header { flex-wrap: wrap; height: auto; padding: 8px; gap: 6px; }
  .logo { font-size: 15px; }
  .btn { padding: 4px 8px; font-size: 11px; }
  .header-spacer { display: none; }
}
</style>
</head>
<body>

<!-- ── Pyodide boot overlay ─────────────────────────────────────── -->
<div id="pyodide-overlay">
  <div class="boot-logo">🎮</div>
  <div class="boot-title">Ipp Playground</div>
  <div class="boot-sub" id="boot-sub">Initialising Pyodide runtime…</div>
  <div class="boot-progress"><div class="boot-bar" id="boot-bar"></div></div>
  <div id="boot-log">Loading Python 3.12 in WebAssembly…</div>
</div>

<!-- ── Header ───────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-gem">ip</div>
    Ipp Language
    <span class="version-pill" id="version-pill">v…</span>
  </div>

  <div id="status-dot" class="loading"></div>
  <span id="status-text">Loading…</span>

  <div class="header-spacer"></div>

  <select class="examples-select" id="examples-select" onchange="loadExample(this.value)">
    <option value="">📚 Examples…</option>
    <optgroup label="Basics">
      <option value="hello">Hello World</option>
      <option value="variables">Variables &amp; Types</option>
      <option value="strings">String Methods</option>
    </optgroup>
    <optgroup label="Control Flow">
      <option value="conditions">Conditions</option>
      <option value="loops">Loops &amp; Ranges</option>
      <option value="comprehensions">List Comprehensions</option>
    </optgroup>
    <optgroup label="Functions &amp; OOP">
      <option value="functions">Functions &amp; Closures</option>
      <option value="classes">Classes &amp; Inheritance</option>
      <option value="decorators">Decorators</option>
    </optgroup>
    <optgroup label="Advanced">
      <option value="error_handling">Error Handling</option>
      <option value="generators">Generators</option>
      <option value="math">Math &amp; Vectors</option>
      <option value="async_demo">Async/Await</option>
    </optgroup>
  </select>

  <button class="btn" onclick="fmtCode()" title="Format code (Ctrl+Shift+F)">⚡ Format</button>
  <button class="btn" onclick="shareLink()" title="Copy shareable URL">🔗 Share</button>
  <button class="btn" onclick="downloadCode()" title="Download .ipp file">💾 Save</button>
  <button class="btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  <button class="btn btn-run" id="run-btn" onclick="runCode()" title="Run (Ctrl+Enter)">▶ Run</button>
</header>

<!-- ── Main workspace ───────────────────────────────────────────── -->
<div class="workspace" id="workspace">

  <!-- LEFT: Editor -->
  <div class="editor-pane" id="editor-pane">
    <div class="tab-bar">
      <div class="demo-chips" id="demo-chips">
        <div class="demo-chip active" data-demo="hello" onclick="loadDemo('hello',this)">Hello</div>
        <div class="demo-chip" data-demo="classes" onclick="loadDemo('classes',this)">Classes</div>
        <div class="demo-chip" data-demo="canvas" onclick="loadDemo('canvas',this)">Canvas</div>
        <div class="demo-chip" data-demo="math" onclick="loadDemo('math',this)">Math</div>
        <div class="demo-chip" data-demo="game" onclick="loadDemo('game',this)">Game</div>
        <div class="demo-chip" data-demo="error_handling" onclick="loadDemo('error_handling',this)">Errors</div>
      </div>
      <div class="tab-bar-spacer"></div>
      <div class="editor-actions">
        <button class="btn" onclick="editor.execCommand('find')" title="Find (Ctrl+F)">🔍</button>
        <button class="btn" onclick="undoEdit()" title="Undo">↩</button>
      </div>
    </div>
    <div class="editor-wrap">
      <textarea id="editor"></textarea>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <!-- RIGHT: Output -->
  <div class="output-pane" id="output-pane">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('console',this)">Console</div>
      <div class="tab" onclick="switchTab('canvas',this)">Canvas</div>
      <div class="tab" onclick="switchTab('docs',this)">Docs</div>
      <div class="tab-bar-spacer"></div>
      <button class="btn" style="font-size:11px;padding:2px 8px" onclick="clearConsole()">Clear</button>
    </div>

    <div class="output-panels">
      <!-- Console -->
      <div class="output-tab-content active" id="tab-console">
        <div id="console-output"><div class="out-empty">▸ Run your code with Ctrl+Enter or the Run button</div></div>
      </div>

      <!-- Canvas -->
      <div class="output-tab-content" id="tab-canvas">
        <div id="canvas-wrap">
          <canvas id="ipp-canvas" width="480" height="320"></canvas>
        </div>
      </div>

      <!-- Docs -->
      <div class="output-tab-content" id="tab-docs">
        <div id="docs-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Status bar ────────────────────────────────────────────────── -->
<div class="statusbar">
  <div class="sb-item" id="sb-mode">🐍 Pyodide</div>
  <span class="sb-sep">│</span>
  <div class="sb-item" id="sb-cursor">Ln 1, Col 1</div>
  <span class="sb-sep">│</span>
  <div class="sb-item" id="sb-lines">0 lines</div>
  <span class="sb-sep">│</span>
  <div class="sb-item" id="sb-time"></div>
  <div style="flex:1"></div>
  <div class="sb-item">Ctrl+Enter to run · Ctrl+S to save</div>
</div>

<div id="snackbar"></div>

<!-- ── Scripts ──────────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/search.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.js"></script>

<script>
'use strict';

// ── Ipp syntax highlighting mode ──────────────────────────────────────────────
CodeMirror.defineMode('ipp', function() {
  const KW = new Set([
    'func','class','var','let','const','if','elif','else','for','while','do','until',
    'return','break','continue','import','from','as','try','catch','throw','finally',
    'match','case','default','async','await','yield','extends','super','self','this',
    'new','in','not','and','or','is','enum','interface','implements','static','pub',
    'priv','mut','ref','defer','with','pass','del'
  ]);
  const ATOM = new Set(['nil','true','false','None','True','False']);
  const BUILTIN = new Set([
    'print','str','int','float','bool','len','abs','type','range','assert','list','dict',
    'set','tuple','max','min','sum','sorted','reversed','enumerate','zip','map','filter',
    'input','chr','ord','hex','bin','oct','repr','hash','id','dir','vars','callable',
    'hasattr','getattr','setattr','delattr','isinstance','issubclass','iter','next',
    'open','round','pow','divmod','all','any','slice','eval',
    'print','ipp_type','ipp_len','ipp_min','ipp_max','json_parse','json_stringify',
    'base64_encode','base64_decode','strip_ansi','ipp_version',
    'key_pressed','get_key','on_keydown','on_keyup','advance_frame','KEY',
    'vec2','vec3','vec4','mat4','quat','complex','Color','Rect','Vector2','Vector3',
    'canvas','scene','node','camera','mesh','light','render_to_canvas',
    'sqrt','sin','cos','tan','atan2','floor','ceil','log','exp','pi','tau','inf',
    'random','randint','choice','shuffle','seed',
    'http_get','http_post','http_put','websocket_connect',
    'Signal','deque','PriorityQueue','Tree','Graph','datetime',
    'logger','format','sprintf'
  ]);
  const TYPE = new Set([
    'Number','String','Bool','List','Dict','Set','Func','Class','Object',
    'Vector2','Vector3','Vector4','Matrix4','Quaternion','Color','Rect','Complex',
    'Signal','Error','TypeError','ValueError','IndexError','KeyError','RuntimeError'
  ]);

  return {
    startState() {
      return { tokenize: null, inString: false, stringChar: null, depth: 0 };
    },
    token(stream, state) {
      if (stream.eatSpace()) return null;

      // Line comment
      if (stream.match(/^#.*/)) return 'comment';

      // Decorator @name
      if (stream.match(/^@[a-zA-Z_]\w*/)) return 'decorator';

      // String — single or double quoted, with escape support
      const sq = stream.peek();
      if (sq === '"' || sq === "'") {
        stream.next();
        const delim = sq;
        while (!stream.eol()) {
          const ch = stream.next();
          if (ch === '\\') { stream.next(); continue; }
          if (ch === delim) break;
        }
        return 'string';
      }

      // Triple-quoted string (simplified — eat to end of line)
      if (stream.match(/^("""|''')/, false)) {
        stream.match(/^("""|''')/);
        while (!stream.eol()) stream.next();
        return 'string-2';
      }

      // Number: hex, float, int
      if (stream.match(/^0x[0-9a-fA-F]+/)) return 'number';
      if (stream.match(/^-?\d+\.?\d*([eE][+-]?\d+)?/)) return 'number';

      // Identifier or keyword
      if (stream.match(/^[a-zA-Z_]\w*/)) {
        const word = stream.current();
        if (KW.has(word))      return 'keyword';
        if (ATOM.has(word))    return 'atom';
        if (TYPE.has(word))    return 'type';
        if (BUILTIN.has(word)) return 'builtin';
        // Function definition
        if (word === 'func' || word === 'class') return 'keyword';
        // Detect function call: word followed by (
        if (stream.peek() === '(') return 'def';
        return 'variable';
      }

      // Operators
      if (stream.match(/^(===|!==|==|!=|<=|>=|<<?|>>?|[+\-*\/%^&|~!<>=]=?|\.\.\.?)/)) return 'operator';

      // Brackets
      if (stream.match(/^[(){}\[\]]/)) return 'bracket';

      stream.next();
      return null;
    },
    lineComment: '#',
    fold: 'brace',
  };
});

// ── Editor setup ──────────────────────────────────────────────────────────────
let editor, pyodide = null, runCount = 0;
let lightTheme = false;

function initEditor() {
  editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: 'ipp',
    theme: 'default',  // we override all colours via CSS
    lineNumbers: true,
    matchBrackets: true,
    autoCloseBrackets: true,
    tabSize: 4,
    indentWithTabs: false,
    lineWrapping: false,
    styleActiveLine: true,
    foldGutter: false,
    extraKeys: {
      'Ctrl-Enter':   () => runCode(),
      'Cmd-Enter':    () => runCode(),
      'Ctrl-S':       () => downloadCode(),
      'Cmd-S':        () => downloadCode(),
      'Ctrl-/':       'toggleComment',
      'Cmd-/':        'toggleComment',
      'Ctrl-Space':   (cm) => showAutocomplete(cm),
    }
  });

  // Load saved or default
  const fromUrl = loadFromUrl();
  if (!fromUrl) {
    const saved = localStorage.getItem('ipp_pg_code');
    editor.setValue(saved || DEMOS.hello);
  }

  // Autosave on change
  editor.on('change', () => {
    localStorage.setItem('ipp_pg_code', editor.getValue());
    updateStatusBar();
  });
  editor.on('cursorActivity', updateStatusBar);
  updateStatusBar();
}

function showAutocomplete(cm) {
  const allWords = [
    'func','class','var','let','if','elif','else','for','while','return','break',
    'continue','import','try','catch','throw','nil','true','false','async','await',
    'yield','extends','super','self','match','case','default',
    'print','str','int','float','bool','len','abs','type','range','assert','sorted',
    'reversed','enumerate','zip','map','filter','max','min','sum','slice',
    'json_parse','json_stringify','base64_encode','base64_decode',
    'ipp_type','ipp_version','strip_ansi',
    'vec2','vec3','vec4','mat4','quat','complex','sqrt','sin','cos','tan','pi',
    'canvas','key_pressed','get_key','advance_frame',
    'Signal','deque','datetime','random','randint',
  ];
  CodeMirror.showHint(cm, () => {
    const cur = cm.getCursor();
    const token = cm.getTokenAt(cur);
    const start = token.start, end = cur.ch;
    const word = token.string.slice(0, end - start);
    const list = allWords.filter(w => w.startsWith(word) && w !== word);
    return { list, from: CodeMirror.Pos(cur.line, start), to: CodeMirror.Pos(cur.line, end) };
  }, { completeSingle: false });
}

function updateStatusBar() {
  if (!editor) return;
  const cur = editor.getCursor();
  document.getElementById('sb-cursor').textContent = `Ln ${cur.line+1}, Col ${cur.ch+1}`;
  const count = editor.lineCount();
  document.getElementById('sb-lines').textContent = `${count} line${count!==1?'s':''}`;
}

// ── Pyodide loader ────────────────────────────────────────────────────────────
let ippCode = '';  // Ipp source bundle injected from Python

async function bootPyodide() {
  const overlay = document.getElementById('pyodide-overlay');
  const bar = document.getElementById('boot-bar');
  const log = document.getElementById('boot-log');
  const sub = document.getElementById('boot-sub');

  function progress(pct, msg) {
    bar.style.width = pct + '%';
    log.textContent = msg;
  }

  try {
    progress(5, 'Fetching Pyodide 0.26…');
    sub.textContent = 'Loading Pyodide (Python 3.12 in WASM)…';

    // Load pyodide script dynamically
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });

    progress(25, 'Pyodide script loaded, initialising…');
    sub.textContent = 'Initialising Python runtime (first load ~5 s)…';

    pyodide = await loadPyodide({
      indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/',
      stdout: (s) => appendLine(s, 'print'),
      stderr: (s) => appendLine(s, 'error'),
    });

    progress(60, 'Python 3.12 ready — loading Ipp engine…');
    sub.textContent = 'Injecting Ipp language engine…';

    await loadIppEngine();

    progress(90, 'Engine ready — fetching version…');

    // Read actual VERSION from the installed/loaded Ipp engine
    try {
      const versionStr = pyodide.runPython(`
try:
    from ipp.main import VERSION
    VERSION
except:
    try:
        import re, pathlib
        # Try to get from ippCode string
        "1.7.9.1"
    except:
        "1.7.9.1"
`);
      document.getElementById('version-pill').textContent = 'v' + versionStr;
      document.getElementById('sb-mode').textContent = '🐍 Pyodide · Ipp v' + versionStr;
    } catch(e) {
      document.getElementById('version-pill').textContent = 'v1.7.9.1';
    }

    progress(100, '✓ Ready!');
    sub.textContent = 'All systems go!';

    setStatus('ready', 'Ready');
    setTimeout(() => overlay.classList.add('hidden'), 600);

    buildDocs();

  } catch (err) {
    progress(0, '');
    sub.textContent = '⚠ Failed to load Pyodide — running in demo mode';
    log.textContent = String(err).slice(0, 120);
    setStatus('error', 'Demo mode');
    setTimeout(() => overlay.classList.add('hidden'), 2000);
  }
}

async function loadIppEngine() {
  // Strategy 1: Try micropip.install from PyPI (works when Pyodide has network access)
  // Strategy 2: Fetch files from local server (works when served from repo root)
  // Strategy 3: Fall back to demo mode

  document.getElementById('boot-log').textContent = 'Installing Ipp engine…';

  // Set up filesystem structure first
  pyodide.runPython(`
import sys, os
for d in ['/ipp','/ipp/lexer','/ipp/parser','/ipp/interpreter','/ipp/runtime','/ipp/vm','/ipp/wasm','/ipp/network','/ipp/lsp']:
    os.makedirs(d, exist_ok=True)
if '/' not in sys.path:
    sys.path.insert(0, '/')
`);

  // Strategy 1: micropip from PyPI
  try {
    document.getElementById('boot-log').textContent = 'Installing ipp-lang from PyPI…';
    document.getElementById('boot-bar').style.width = '65%';
    await pyodide.loadPackage('micropip');
    const micropip = pyodide.pyimport('micropip');
    await micropip.install('ipp-lang');
    document.getElementById('boot-bar').style.width = '85%';

    // Verify import works
    const ok = pyodide.runPython(`
try:
    from ipp.lexer.lexer import tokenize
    from ipp.parser.parser import parse
    from ipp.interpreter.interpreter import Interpreter
    _IPP_AVAILABLE = True
    result = True
except Exception as e:
    _IPP_AVAILABLE = False
    _IPP_ERR = str(e)
    result = False
result
`);
    if (ok) {
      // Get version
      const ver = pyodide.runPython(`
try:
    from ipp.main import VERSION
    VERSION
except:
    "1.7.9.1"
`);
      ippCode = `VERSION = "${ver}"`;
      document.getElementById('boot-log').textContent = `✓ ipp-lang ${ver} installed from PyPI`;
      document.getElementById('boot-bar').style.width = '95%';
      return;
    }
  } catch(e) {
    console.log('micropip install failed:', e.message || e);
  }

  // Strategy 2: Fetch files from local server (playground opened from repo)
  document.getElementById('boot-log').textContent = 'Fetching Ipp source from local server…';
  document.getElementById('boot-bar').style.width = '65%';

  const files = [
    { path: '../ipp/__init__.py',                    vpath: '/ipp/__init__.py' },
    { path: '../ipp/lexer/__init__.py',              vpath: '/ipp/lexer/__init__.py' },
    { path: '../ipp/lexer/lexer.py',                 vpath: '/ipp/lexer/lexer.py' },
    { path: '../ipp/lexer/token.py',                 vpath: '/ipp/lexer/token.py' },
    { path: '../ipp/parser/__init__.py',             vpath: '/ipp/parser/__init__.py' },
    { path: '../ipp/parser/parser.py',               vpath: '/ipp/parser/parser.py' },
    { path: '../ipp/parser/ast.py',                  vpath: '/ipp/parser/ast.py' },
    { path: '../ipp/interpreter/__init__.py',        vpath: '/ipp/interpreter/__init__.py' },
    { path: '../ipp/interpreter/interpreter.py',     vpath: '/ipp/interpreter/interpreter.py' },
    { path: '../ipp/runtime/__init__.py',            vpath: '/ipp/runtime/__init__.py' },
    { path: '../ipp/runtime/builtins.py',            vpath: '/ipp/runtime/builtins.py' },
    { path: '../ipp/runtime/keyboard.py',            vpath: '/ipp/runtime/keyboard.py' },
    { path: '../ipp/vm/__init__.py',                 vpath: '/ipp/vm/__init__.py' },
    { path: '../ipp/vm/bytecode.py',                 vpath: '/ipp/vm/bytecode.py' },
    { path: '../ipp/vm/compiler.py',                 vpath: '/ipp/vm/compiler.py' },
    { path: '../ipp/vm/vm.py',                       vpath: '/ipp/vm/vm.py' },
    { path: '../ipp/main.py',                        vpath: '/ipp/main.py' },
  ];

  let loadedCount = 0;
  let successCount = 0;
  for (const f of files) {
    try {
      const resp = await fetch(f.path);
      if (resp.ok) {
        const text = await resp.text();
        pyodide.FS.writeFile(f.vpath, text);
        if (f.vpath === '/ipp/main.py') { ippCode = text; }
        successCount++;
      }
    } catch(e) { /* not served locally — skip */ }
    loadedCount++;
    document.getElementById('boot-bar').style.width =
      Math.round(65 + (loadedCount / files.length) * 25) + '%';
  }

  if (successCount >= 4) {
    // Try to import
    try {
      const ok = pyodide.runPython(`
try:
    from ipp.lexer.lexer import tokenize
    from ipp.parser.parser import parse
    from ipp.interpreter.interpreter import Interpreter
    _IPP_AVAILABLE = True
    result = True
except Exception as e:
    _IPP_AVAILABLE = False
    _IPP_ERR = str(e)
    result = False
result
`);
      if (ok) {
        document.getElementById('boot-log').textContent = '✓ Ipp loaded from local files';
        return;
      }
    } catch(e) {}
  }

  // Strategy 3: Demo fallback
  console.warn('Ipp engine unavailable — demo mode active');
  document.getElementById('boot-log').textContent = '⚠ Demo mode (limited — open from repo for full engine)';
  pyodide.runPython(`_IPP_AVAILABLE = False`);
}

// ── Run code ──────────────────────────────────────────────────────────────────
async function runCode() {
  const code = editor.getValue();
  if (!code.trim()) return;

  clearConsole();
  setStatus('running', 'Running…');
  const runBtn = document.getElementById('run-btn');
  runBtn.classList.add('loading');
  runBtn.textContent = '⏳ Running…';

  const t0 = performance.now();
  runCount++;
  const rc = runCount;

  appendLine(`▸ Run #${rc}`, 'system');

  try {
    if (pyodide) {
      await runWithPyodide(code);
    } else {
      runFallback(code);
    }
    const dt = ((performance.now() - t0) / 1000).toFixed(3);
    document.getElementById('sb-time').textContent = `${dt}s`;
    appendLine(`✓ Done in ${dt}s`, 'success');
    setStatus('ready', 'Ready');
  } catch(err) {
    appendLine('Error: ' + err.message, 'error');
    setStatus('error', 'Error');
  }

  runBtn.classList.remove('loading');
  runBtn.textContent = '▶ Run';
}

async function runWithPyodide(code) {
  try {
    pyodide.runPython(`
import sys, io

_stdout_buf = io.StringIO()
_stderr_buf = io.StringIO()
_old_stdout = sys.stdout
_old_stderr = sys.stderr
sys.stdout = _stdout_buf
sys.stderr = _stderr_buf

_run_ok = False
_run_err = None

try:
    from ipp.lexer.lexer import tokenize
    from ipp.parser.parser import parse
    from ipp.interpreter.interpreter import Interpreter

    _interp = Interpreter()
    _src = ${JSON.stringify(code)}
    _tokens = tokenize(_src)
    _ast = parse(_tokens)
    _interp.run(_ast)
    _run_ok = True
except SystemExit:
    _run_ok = True
except Exception as _e:
    _run_err = str(_e)
finally:
    sys.stdout = _old_stdout
    sys.stderr = _old_stderr

_out_text = _stdout_buf.getvalue()
_err_text = _stderr_buf.getvalue()
`);

    const outText = pyodide.globals.get('_out_text');
    const errText = pyodide.globals.get('_err_text');
    const runOk   = pyodide.globals.get('_run_ok');
    const runErr  = pyodide.globals.get('_run_err');

    if (outText) {
      for (const line of outText.split('\n')) {
        if (line !== '') appendLine(line, 'print');
      }
    }
    if (errText) {
      for (const line of errText.split('\n')) {
        if (line !== '') appendLine(line, 'warn');
      }
    }
    if (!runOk && runErr) {
      appendLine(runErr, 'error');
      throw new Error(runErr);
    }

  } catch(pyErr) {
    if (!pyErr.message?.includes('[Error]')) {
      appendLine(String(pyErr), 'error');
    }
    throw pyErr;
  }
}

function runFallback(code) {
  // Minimal demo interpreter when Pyodide isn't available
  appendLine('⚠ Pyodide not loaded — running in demo mode', 'warn');
  const lines = code.split('\n');
  for (const ln of lines) {
    const t = ln.trim();
    if (!t || t.startsWith('#')) continue;
    const m = t.match(/^print\((.+)\)$/);
    if (m) {
      let val = m[1].replace(/^["']|["']$/g, '');
      appendLine(val, 'print');
    }
  }
}

// ── Console output ────────────────────────────────────────────────────────────
let lineNum = 0;

function appendLine(text, type = 'print') {
  const out = document.getElementById('console-output');
  // Remove empty placeholder
  const empty = out.querySelector('.out-empty');
  if (empty) empty.remove();

  lineNum++;
  const div = document.createElement('div');
  div.className = 'out-line ' + type;
  div.innerHTML = `<span class="gutter">${lineNum}</span><span class="text">${escHtml(text)}</span>`;
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}

function clearConsole() {
  lineNum = 0;
  document.getElementById('console-output').innerHTML = '';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Canvas 2D API ─────────────────────────────────────────────────────────────
function initCanvas() {
  const canvas = document.getElementById('ipp-canvas');
  const ctx = canvas.getContext('2d');

  // Expose canvas API to Pyodide global scope
  const api = {
    clear: (color = '#0d0e14') => {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    },
    rect: (x, y, w, h, color = '#7eb3ff') => {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    },
    circle: (x, y, r, color = '#c78dff') => {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    },
    line: (x1, y1, x2, y2, color = '#67e5a0', width = 2) => {
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    },
    text: (x, y, text, color = '#d4d8f0', size = 14) => {
      ctx.fillStyle = color;
      ctx.font = `${size}px JetBrains Mono, monospace`;
      ctx.fillText(String(text), x, y);
    },
    pixel: (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, 1, 1);
    },
    setSize: (w, h) => { canvas.width = w; canvas.height = h; },
    getWidth:  () => canvas.width,
    getHeight: () => canvas.height,
    save:    () => ctx.save(),
    restore: () => ctx.restore(),
    rotate:  (a) => ctx.rotate(a),
    scale:   (x, y) => ctx.scale(x, y),
    translate: (x, y) => ctx.translate(x, y),
    fillStyle:   (c) => { ctx.fillStyle = c; },
    strokeStyle: (c) => { ctx.strokeStyle = c; },
    lineWidth:   (w) => { ctx.lineWidth = w; },
    beginPath:   () => ctx.beginPath(),
    closePath:   () => ctx.closePath(),
    moveTo:      (x, y) => ctx.moveTo(x, y),
    lineTo:      (x, y) => ctx.lineTo(x, y),
    fill:        () => ctx.fill(),
    stroke:      () => ctx.stroke(),
    arc:         (x, y, r, s, e) => ctx.arc(x, y, r, s, e),
  };

  window._ippCanvas = api;
  api.clear();

  // Inject into pyodide when ready
  if (pyodide) injectCanvasIntoPyodide(api);
  return api;
}

function injectCanvasIntoPyodide(api) {
  if (!pyodide) return;
  // Expose as a Python proxy
  pyodide.globals.set('canvas', api);
}

// ── Status helpers ────────────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = state;
  txt.textContent = text;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.output-tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) el.classList.add('active');
}

// ── Examples / demos ──────────────────────────────────────────────────────────
function loadDemo(name, el) {
  if (!DEMOS[name]) return;
  editor.setValue(DEMOS[name]);
  document.querySelectorAll('.demo-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
}

function loadExample(name) {
  if (!name || !DEMOS[name]) { document.getElementById('examples-select').value = ''; return; }
  editor.setValue(DEMOS[name]);
  // Update active chip if it exists
  document.querySelectorAll('.demo-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.demo === name);
  });
  document.getElementById('examples-select').value = '';
  snack('Loaded: ' + name);
}

// ── URL share ─────────────────────────────────────────────────────────────────
function loadFromUrl() {
  try {
    const p = new URLSearchParams(location.search);
    const code = p.get('code');
    if (code) {
      editor.setValue(atob(code));
      snack('Loaded from URL');
      return true;
    }
  } catch(e) {}
  return false;
}

function shareLink() {
  const encoded = btoa(unescape(encodeURIComponent(editor.getValue())));
  const url = location.origin + location.pathname + '?code=' + encoded;
  navigator.clipboard.writeText(url).then(() => snack('Link copied!')).catch(() => {
    prompt('Copy this link:', url);
  });
}

// ── File save / load ──────────────────────────────────────────────────────────
function downloadCode() {
  const blob = new Blob([editor.getValue()], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'program.ipp';
  a.click();
  snack('Saved program.ipp');
}

function fmtCode() {
  // Simple formatter: normalise indentation
  const lines = editor.getValue().split('\n');
  let depth = 0;
  const out = lines.map(ln => {
    const t = ln.trim();
    if (!t) return '';
    if (t === '}' || t === '} else {' || t.startsWith('} elif') || t.startsWith('} catch') || t.startsWith('} finally')) depth = Math.max(0, depth - 1);
    const indented = '    '.repeat(depth) + t;
    if (t.endsWith('{')) depth++;
    return indented;
  });
  editor.setValue(out.join('\n'));
  snack('Formatted!');
}

function undoEdit() { editor.undo(); }

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  lightTheme = !lightTheme;
  document.body.classList.toggle('light', lightTheme);
  document.getElementById('theme-btn').textContent = lightTheme ? '☀️' : '🌙';
  localStorage.setItem('ipp_theme', lightTheme ? 'light' : 'dark');
}
(function() {
  if (localStorage.getItem('ipp_theme') === 'light') toggleTheme();
})();

// ── Resizer ───────────────────────────────────────────────────────────────────
(function() {
  const resizer = document.getElementById('resizer');
  const ws = document.getElementById('workspace');
  let dragging = false, startX, startCols;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    const cols = getComputedStyle(ws).gridTemplateColumns.split(' ');
    startCols = cols.map(c => parseFloat(c));
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const total = ws.offsetWidth;
    const pct = ((startCols[0] + dx) / total * 100).toFixed(1);
    const clamped = Math.min(Math.max(pct, 25), 75);
    ws.style.gridTemplateColumns = `${clamped}% 4px 1fr`;
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ── Snackbar ──────────────────────────────────────────────────────────────────
let _snackTimer;
function snack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_snackTimer);
  _snackTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Keyboard shortcut display ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

// ── Boot sequence ─────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  initEditor();
  initCanvas();
  buildDocs();
  bootPyodide();
});
